<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>babyGLOW Campaign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  /* babyGLOW by Teoxane — watery lavender / aqua "lit-from-within" palette.
     Token NAMES kept identical so all inline var(--…) styles re-theme automatically. */
  --porcelain:#F3F4FC; --surface:#FFFFFF; --ink:#28284D; --muted:#8C8CA8;
  --line:#E7E6F3; --coral:#7C82E6; --coral-deep:#565CC8; --amber:#8FD3EC;
  --soft:#ECECFB; --glow1:#8E94F0; --glow2:#7FC9E8;
  --green:#3FA98A; --green-soft:#E0F2EC; --blue:#5E83E8; --blue-soft:#E8EEFD;
  --warn:#C99A3B; --warn-soft:#F6EFD9; --rose:#D26088; --rose-soft:#FBE6EC;
  --radius:16px; --shadow:0 1px 3px rgba(40,40,77,.06),0 8px 24px rgba(40,40,77,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--porcelain);color:var(--ink);
  line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
h1,h2,h3,.display{font-family:'Fraunces',serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:var(--coral-deep);text-decoration:none}
a:hover{text-decoration:underline}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink);
  border:1px solid var(--line);border-radius:10px;padding:9px 11px;background:#fff;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--coral);outline-offset:-1px;border-color:transparent}
.hidden{display:none!important}

/* ---------- Gate / login ---------- */
.gate{position:relative;min-height:100vh;min-height:100dvh;display:flex;align-items:center;
  justify-content:center;padding:24px;overflow:hidden;
  background:
    radial-gradient(78% 58% at 80% 16%, rgba(255,255,255,.9), rgba(255,255,255,0) 62%),
    radial-gradient(68% 52% at 16% 24%, #DCE0FA 0%, rgba(220,224,250,0) 60%),
    radial-gradient(95% 70% at 50% 118%, #C6D4F0 0%, rgba(198,212,240,0) 56%),
    linear-gradient(158deg,#EEF0FC 0%,#E3E9FA 40%,#DCE7F6 72%,#E9E5F6 100%)}
.gate-water{position:absolute;inset:0;z-index:0;opacity:.55;mix-blend-mode:soft-light;pointer-events:none}
.gate-water svg{width:100%;height:100%;display:block}
.gate-inner{position:relative;z-index:1;width:100%;max-width:430px;text-align:center}
.gate-logo-wrap{margin:0 auto 30px}
.gate-logo{display:block;margin:0 auto;width:62%;max-width:280px;height:auto;
  filter:drop-shadow(0 12px 30px rgba(60,66,160,.18))}
.gate-logo-text{font-family:'Fraunces';line-height:.92;letter-spacing:-.01em}
.gate-logo-text .baby{display:block;font-size:46px;font-weight:500;color:var(--ink)}
.gate-logo-text .glow{display:block;font-size:58px;font-weight:700;font-style:normal;
  background:linear-gradient(95deg,var(--glow1),var(--glow2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.gate-card{background:rgba(255,255,255,.6);backdrop-filter:blur(18px) saturate(1.25);
  -webkit-backdrop-filter:blur(18px) saturate(1.25);border-radius:24px;
  box-shadow:0 20px 50px rgba(50,54,120,.16);padding:30px 30px 32px;width:100%;
  text-align:center;border:1px solid rgba(255,255,255,.7)}
.brand{display:inline-flex;align-items:center;gap:0;font-family:'Fraunces';font-weight:600}
.brand .baby{font-size:30px;color:var(--ink)}
.brand .glow{font-size:30px;background:linear-gradient(95deg,var(--glow1),var(--glow2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-style:italic}
.top-logo{height:40px;width:auto;display:block}
.gate-sub{color:var(--coral-deep);font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600}
.gate-tagline{margin:14px 0 24px;font-family:'Fraunces';font-size:19px;color:var(--ink)}
.role-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.role-btn{border:1px solid var(--line);border-radius:14px;padding:18px 12px;background:#fff;
  transition:.15s;text-align:center}
.role-btn:hover{border-color:var(--coral);transform:translateY(-2px);box-shadow:var(--shadow)}
.role-btn .ic{font-size:22px;display:block;margin-bottom:6px}
.role-btn .t{display:block;font-weight:600;font-size:14px}
.role-btn .d{display:block;font-size:11px;color:var(--muted);margin-top:3px}
.pw-wrap{margin-top:14px;text-align:left}
.pw-wrap label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
.pw-row{display:flex;gap:8px}
.btn-primary{background:linear-gradient(95deg,var(--glow1),var(--glow2));color:#fff;font-weight:600;
  border-radius:10px;padding:9px 16px;white-space:nowrap;transition:.15s}
.btn-primary:hover{filter:brightness(1.04);box-shadow:0 6px 16px rgba(244,121,91,.3)}
.err{color:var(--rose);font-size:12px;margin-top:8px;min-height:16px}

/* ---------- App shell ---------- */
.shell{max-width:1180px;margin:0 auto;padding:0 20px 80px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:18px 0 16px;flex-wrap:wrap}
.topbar .brand .baby,.topbar .brand .glow{font-size:24px}
.top-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:600;padding:5px 10px;border-radius:999px;letter-spacing:.03em}
.chip.admin{background:var(--soft);color:var(--coral-deep)}
.chip.viewer{background:var(--blue-soft);color:var(--blue)}
.btn-ghost{border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:13px;
  font-weight:500;color:var(--ink);background:#fff;transition:.15s}
.btn-ghost:hover{border-color:var(--coral);color:var(--coral-deep)}
.lang-toggle{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.lang-toggle button{padding:6px 11px;font-size:12px;font-weight:600;color:var(--muted)}
.lang-toggle button.on{background:var(--ink);color:#fff}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:24px;overflow-x:auto}
.tab{padding:11px 16px;font-size:14px;font-weight:600;color:var(--muted);
  border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--coral-deep);border-bottom-color:var(--coral)}
.tab .count{font-size:11px;background:var(--soft);color:var(--coral-deep);
  padding:1px 7px;border-radius:999px;margin-left:6px;font-weight:600}

/* section headers */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;
  margin-bottom:18px;flex-wrap:wrap}
.sec-head h2{font-size:26px;font-weight:600;line-height:1.1}
.sec-head p{color:var(--muted);font-size:13px;margin-top:4px}
.sec-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* filter pills */
.filters{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.fpill{font-size:12px;font-weight:600;padding:6px 13px;border-radius:999px;
  border:1px solid var(--line);background:#fff;color:var(--muted);transition:.15s}
.fpill:hover{border-color:var(--coral)}
.fpill.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* influencer grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:14px}
.icard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;transition:.15s;position:relative}
.icard:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.icard-top{display:flex;gap:12px;align-items:center}
.avatar{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-weight:700;color:#fff;font-size:17px;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.icard .handle{font-weight:600;font-size:15px;display:flex;align-items:center;gap:5px}
.icard .rname{font-size:12px;color:var(--muted)}
.statustag{position:absolute;top:14px;right:14px;font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:999px;letter-spacing:.04em;text-transform:uppercase}
.st-confirmed{background:var(--green-soft);color:var(--green)}
.st-secured{background:var(--soft);color:var(--coral-deep)}
.st-candidate{background:var(--warn-soft);color:var(--warn)}
.st-rejected{background:#F0EBED;color:var(--muted)}
.socials{display:flex;gap:7px;margin-top:13px}
.soc{flex:1;border:1px solid var(--line);border-radius:9px;padding:7px 8px;text-align:center;
  font-size:11px;color:var(--ink);font-weight:600;transition:.15s;display:block}
.soc:hover{border-color:var(--coral);text-decoration:none;background:var(--soft)}
.soc .lbl{display:block;font-size:9px;color:var(--muted);letter-spacing:.08em;margin-bottom:1px}
.icard-meta{margin-top:11px;font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px}
.icard-meta b{color:var(--ink);font-weight:600}
.icard-actions{display:flex;gap:6px;margin-top:12px}
.mini{font-size:11px;font-weight:600;padding:5px 9px;border-radius:8px;border:1px solid var(--line);
  background:#fff;color:var(--ink);transition:.15s}
.mini:hover{border-color:var(--coral);color:var(--coral-deep)}
.mini.solid{background:var(--ink);color:#fff;border-color:var(--ink)}
.mini.solid:hover{background:var(--coral-deep);border-color:var(--coral-deep);color:#fff}

/* clinic cards */
.clinic-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;display:flex;flex-direction:column;gap:6px}
.clinic-card .cname{font-family:'Fraunces';font-size:20px;font-weight:600}
.clinic-card .cbranch{font-size:13px;color:var(--muted)}
.clinic-card .cbookings{font-size:12px;color:var(--ink);margin-top:4px}
.clinic-card .row-end{display:flex;justify-content:space-between;align-items:center;margin-top:8px}

/* table-ish list (reviews) */
.bcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;margin-bottom:14px}
.bcard-head{display:flex;align-items:center;gap:13px;flex-wrap:wrap}
.bcard-head .who{flex:1;min-width:160px}
.bcard-head .who .h{font-weight:600;font-size:16px}
.bcard-head .who .s{font-size:12px;color:var(--muted)}
.binfo{display:flex;gap:18px;flex-wrap:wrap;font-size:13px}
.binfo .it{display:flex;flex-direction:column}
.binfo .it .k{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.binfo .it .v{font-weight:600}

/* stepper */
.stepper{display:flex;gap:0;margin:16px 0 4px;flex-wrap:wrap}
.step{flex:1;min-width:74px;text-align:center;position:relative;padding-top:18px}
.step:before{content:'';position:absolute;top:6px;left:50%;width:100%;height:2px;background:var(--line)}
.step:first-child:before{display:none}
.step .dot{width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid var(--line);
  position:absolute;top:0;left:calc(50% - 7px);z-index:2}
.step.done .dot{background:var(--green);border-color:var(--green)}
.step.cur .dot{background:var(--coral);border-color:var(--coral);box-shadow:0 0 0 4px var(--soft)}
.step.done:before,.step.cur:before{background:var(--green)}
.step .lab{font-size:10px;color:var(--muted);line-height:1.25;display:block;padding:0 2px}
.step.done .lab,.step.cur .lab{color:var(--ink);font-weight:600}

.wf-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}
.field-row{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
.field-row label{font-size:11px;font-weight:600;color:var(--muted);min-width:96px}
.field-row input{flex:1;min-width:160px}

.divider{height:1px;background:var(--line);margin:14px 0}
.rev-thread{margin-top:6px;display:flex;flex-direction:column;gap:8px}
.rev-msg{border:1px solid var(--line);border-radius:11px;padding:10px 12px;font-size:13px}
.rev-msg.viewer{background:var(--blue-soft);border-color:#D6E4FB}
.rev-msg.admin{background:var(--soft);border-color:#F8DDD2}
.rev-msg .meta{font-size:10px;color:var(--muted);display:flex;justify-content:space-between;
  margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.rev-msg .resolved{color:var(--green);font-weight:700}

/* video block */
.video-block{margin-top:12px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#000}
.video-block iframe{width:100%;height:300px;border:none;display:block}
.no-video{font-size:13px;color:var(--muted);padding:24px;text-align:center;border:1px dashed var(--line);
  border-radius:12px;margin-top:12px}
.vid,.vidframe{width:100%;height:300px;border:none;display:block;background:#000}
.vidwrap{margin-top:12px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#000}
.ms{display:flex;align-items:center;gap:11px;padding:7px 0;font-size:13.5px;color:var(--muted)}
.ms .msdot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;line-height:1}
.ms.on{color:var(--ink)}
.ms.on .msdot{background:var(--green);border-color:var(--green)}
.ms .mslab em{font-style:normal;font-weight:600;color:var(--ink)}
.ms.on .mslab em{color:var(--green)}
.exp{color:var(--muted);font-style:italic;font-weight:600}
.uploadrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}
.filebtn{position:relative;overflow:hidden;display:inline-flex;align-items:center}
.filebtn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}

/* empty state */
.empty{text-align:center;padding:56px 20px;color:var(--muted)}
.empty .ic{font-size:34px;display:block;margin-bottom:10px}
.empty .t{font-family:'Fraunces';font-size:20px;color:var(--ink);margin-bottom:6px}

/* add form */
.addform{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;margin-bottom:20px}
.addform h3{font-size:14px;margin-bottom:12px;font-weight:600}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.form-grid .full{grid-column:1/-1}
.field label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px}

/* dual-date grid (admin timeline dates: expected vs done) */
.dgrid{display:grid;grid-template-columns:90px 1fr 1fr;gap:8px 10px;align-items:center;margin-top:8px}
.dgrid .dh{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
.dgrid .dlab{font-size:12px;font-weight:600;color:var(--ink)}
.dgrid .dcell{display:flex;gap:6px;align-items:center}
.dgrid .dcell input{padding:6px 8px}
@media(max-width:560px){
  .dgrid{grid-template-columns:1fr}
  .dgrid .dh{display:none}
  .dgrid .dlab{margin-top:6px}
}

/* modal */
.modal-back{position:fixed;inset:0;background:rgba(44,35,48,.42);display:flex;align-items:center;
  justify-content:center;padding:20px;z-index:50}
.modal{background:#fff;border-radius:20px;max-width:560px;width:100%;max-height:90vh;overflow:auto;
  box-shadow:0 24px 60px rgba(0,0,0,.25)}
.modal-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;
  justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:2}
.modal-head h3{font-size:18px;font-weight:600}
.modal-body{padding:22px}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;
  justify-content:flex-end;position:sticky;bottom:0;background:#fff}
.x{font-size:20px;color:var(--muted);width:30px;height:30px;border-radius:8px}
.x:hover{background:var(--soft);color:var(--ink)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;
  opacity:0;transition:.25s;z-index:100;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.note-bar{background:var(--warn-soft);border:1px solid #F1DDB0;border-radius:12px;padding:10px 14px;
  font-size:12.5px;color:#8A6A22;margin-bottom:18px;display:flex;gap:8px;align-items:flex-start}
.viewer-intro{background:linear-gradient(100deg,#EEF0FC,#F3F1FB);border:1px solid var(--line);
  border-radius:var(--radius);padding:20px 22px;margin-bottom:24px}
.viewer-intro h2{font-size:22px;font-weight:600;margin-bottom:4px}
.viewer-intro p{font-size:13.5px;color:var(--muted)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px}
.stat-n{font-family:'Fraunces';font-size:34px;font-weight:600;line-height:1}
.stat-l{font-size:12.5px;color:var(--muted);margin-top:6px}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.panel-h{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:14px;font-weight:700}
.funnel-row{display:flex;align-items:center;gap:12px;margin-bottom:9px}
.funnel-lab{width:200px;font-size:13px;flex-shrink:0}
.funnel-track{flex:1;background:var(--soft);border-radius:8px;height:26px;overflow:hidden}
.funnel-fill{height:100%;background:linear-gradient(95deg,var(--glow1),var(--glow2));border-radius:8px;
  color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:flex-end;
  padding:0 9px;min-width:26px;transition:width .5s ease}
.stat-table{width:100%;border-collapse:collapse;font-size:13.5px}
.stat-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--line)}
.stat-table td{padding:8px;border-bottom:1px solid var(--line)}
.stat-table tr:last-child td{border-bottom:none}
.modechip{font-size:11px;font-weight:600;padding:5px 10px;border-radius:999px;background:#EFE6DF;color:var(--muted)}
@media(max-width:560px){.binfo{gap:12px}.step .lab{font-size:9px}.funnel-lab{width:120px;font-size:11px}}

/* ---------- reviewer schedule calendar ---------- */
.sched-toggle{display:flex;gap:7px;margin-bottom:16px}
.cal-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-family:'Fraunces';font-size:20px;font-weight:600}
.cal-nav{display:flex;gap:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:center;font-weight:700;padding:4px 0}
.cal-cell{min-width:0;min-height:80px;border:1px solid var(--line);border-radius:10px;padding:5px 5px 6px;display:flex;flex-direction:column;gap:3px;background:#fff;transition:.15s}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-cell.has{cursor:pointer}
.cal-cell.has:hover{border-color:var(--coral);box-shadow:var(--shadow)}
.cal-cell.sel{border-color:var(--coral);box-shadow:0 0 0 2px var(--soft)}
.cal-num{font-size:11px;font-weight:700;color:var(--ink);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;align-self:flex-start}
.cal-cell.today .cal-num{background:var(--coral);color:#fff}
.cal-chip{font-size:10px;font-weight:600;background:var(--soft);color:var(--coral-deep);border-radius:6px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35}
.cal-chip.upl{background:var(--green-soft);color:var(--green)}
.cal-chip.cut{background:var(--blue-soft);color:var(--blue)}
.cal-chip.vis{background:var(--warn-soft);color:var(--warn)}
.cal-chip.planu{background:#fff;color:var(--coral-deep);border:1px dashed var(--coral)}
.cal-more{font-size:9px;color:var(--muted);font-weight:600;padding-left:2px}

<body>

<!-- GATE -->
<div id="gate" class="gate">
  <div class="gate-water" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
      <defs>
        <filter id="bgw" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="7" stitchTiles="stitch" result="n"/>
          <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.55  0 0 0 0 0.60  0 0 0 0 0.92  0 0 0 0.8 0"/>
          <feGaussianBlur stdDeviation="6"/>
        </filter>
      </defs>
      <rect width="1200" height="800" filter="url(#bgw)"/>
    </svg>
  </div>
  <div class="gate-inner">
    <!-- LOGO: uses BABYGLOW-LOGO-PURPLE-768x525.png at the repo root. Use the transparent version (the original has a black background). Falls back to a styled wordmark if the file is missing. -->
    <div class="gate-logo-wrap">
      <img class="gate-logo" src="BABYGLOW-LOGO-PURPLE-768x525.png" alt="babyGLOW by Teoxane"
           onerror="this.style.display='none';document.getElementById('gateLogoText').style.display='block'">
      <div id="gateLogoText" class="gate-logo-text" style="display:none"><span class="baby">baby</span><span class="glow">GLOW</span></div>
    </div>
    <div class="gate-card">
      <div class="gate-sub">Campaign Console</div>
      <div class="gate-tagline">Who's signing in?</div>
    <div class="role-row">
      <button class="role-btn" onclick="chooseRole('viewer')">
        <span class="ic">👀</span><span class="t">Reviewer</span>
        <span class="d">Watch & request edits</span>
      </button>
      <button class="role-btn" onclick="chooseRole('admin')">
        <span class="ic">⚙️</span><span class="t">Admin</span>
        <span class="d">Manage the campaign</span>
      </button>
    </div>
    <div id="pwWrap" class="pw-wrap hidden">
      <label>Admin password</label>
      <div class="pw-row">
        <input id="pwInput" type="password" placeholder="••••" onkeydown="if(event.key==='Enter')tryAdmin()">
        <button class="btn-primary" onclick="tryAdmin()">Enter</button>
      </div>
      <div id="pwErr" class="err"></div>
    </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="shell hidden">
  <div class="topbar">
    <div class="brand">
      <img class="top-logo" src="BABYGLOW-LOGO-PURPLE-768x525.png" alt="babyGLOW"
           onerror="this.style.display='none';this.nextElementSibling.style.display='inline-flex'">
      <span class="brand-text" style="display:none"><span class="baby">baby</span><span class="glow">GLOW</span></span>
      <span style="font-family:'Inter';font-size:12px;color:var(--muted);margin-left:10px;font-weight:600;letter-spacing:.05em">CAMPAIGN</span>
    </div>
    <div class="top-meta">
      <span id="storeMode" class="modechip"></span>
      <span id="roleChip" class="chip"></span>
      <div id="langToggle" class="lang-toggle hidden">
        <button id="langEn" onclick="setLang('en')">EN</button>
        <button id="langKo" onclick="setLang('ko')">한글</button>
      </div>
      <button id="exportBtn" class="btn-ghost hidden" onclick="exportExcel()">⬇ <span data-t="exportExcel"></span></button>
      <button id="saveTopBtn" class="btn-ghost" onclick="saveNow()">💾 <span data-t="saveTop"></span></button>
      <button class="btn-ghost" onclick="signOut()"><span data-t="signOut"></span></button>
    </div>
  </div>

  <div id="tabs" class="tabs"></div>
  <div id="view"></div>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

let DB=null;

/* ============================================================
   PERSISTENCE — works on Claude artifacts AND on Vercel/static.
   Auto-detected backend:
     • Claude artifact  -> window.storage (shared)
     • Vercel default   -> localStorage   (free, but THIS DEVICE only)
     • Vercel + sharing -> free cloud sync via JSONBin (all devices)
   To turn on shared cloud sync after deploying to Vercel:
     1) Go to https://jsonbin.io  ->  create a free account
     2) Create a new bin with content:  {"data":null,"videos":{}}
     3) Copy the Bin ID and your X-Master-Key
     4) Fill CLOUD below and set enabled:true, then redeploy.
   (Note: the key sits in client code, so use a private bin for a
    small internal team. Uploadvideo FILES may exceed the free
    cloud size limit — prefer pasting Google Drive / YouTube links.)
   ============================================================ */
const CLOUD={ enabled:true, binId:'6a295019da38895dfea6316e', key:'$2a$10$Y6cFD2IJNLFWhCoCGvNqRegHnjLx/y0UHxtgftyahJvu/CNoO9K82' };

const Store={
  mode:(typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function')?'claude'
       :(CLOUD.enabled&&CLOUD.binId&&CLOUD.key)?'cloud':'local',
  _cache:null,
  async _get(){
    const r=await fetch('https://api.jsonbin.io/v3/b/'+CLOUD.binId+'/latest',{headers:{'X-Master-Key':CLOUD.key}});
    if(!r.ok)throw new Error('cloud get '+r.status);
    const j=await r.json();return j.record||{data:null,videos:{}};
  },
  async _put(o){
    const r=await fetch('https://api.jsonbin.io/v3/b/'+CLOUD.binId,{method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':CLOUD.key},body:JSON.stringify(o)});
    if(!r.ok)throw new Error('cloud put '+r.status);
  },
  async getMain(){
    if(this.mode==='claude'){try{const r=await window.storage.get(STORE_KEY,true);return r&&r.value?JSON.parse(r.value):null;}catch(e){return null;}}
    if(this.mode==='cloud'){const c=await this._get();this._cache=c;return c.data||null;}
    try{const v=localStorage.getItem(STORE_KEY);return v?JSON.parse(v):null;}catch(e){return null;}
  },
  async setMain(data){
    if(this.mode==='claude'){try{await window.storage.set(STORE_KEY,JSON.stringify(data),true);}catch(e){}return;}
    if(this.mode==='cloud'){const c=this._cache||await this._get();c.data=data;this._cache=c;await this._put(c);return;}
    try{localStorage.setItem(STORE_KEY,JSON.stringify(data));}catch(e){}
  },
  async getVideo(bid){
    if(this.mode==='claude'){try{const r=await window.storage.get('babyglow:video:'+bid,true);return r&&r.value?r.value:null;}catch(e){return null;}}
    if(this.mode==='cloud'){const c=this._cache||await this._get();this._cache=c;return (c.videos&&c.videos[bid])||null;}
    try{return localStorage.getItem('babyglow:video:'+bid);}catch(e){return null;}
  },
  async setVideo(bid,dataUrl){
    if(this.mode==='claude'){await window.storage.set('babyglow:video:'+bid,dataUrl,true);return;}
    if(this.mode==='cloud'){const c=this._cache||await this._get();c.videos=c.videos||{};c.videos[bid]=dataUrl;this._cache=c;await this._put(c);return;}
    localStorage.setItem('babyglow:video:'+bid,dataUrl);
  },
  async delVideo(bid){
    if(this.mode==='claude'){try{await window.storage.delete('babyglow:video:'+bid,true);}catch(e){}return;}
    if(this.mode==='cloud'){const c=this._cache||await this._get();if(c.videos)delete c.videos[bid];this._cache=c;await this._put(c);return;}
    try{localStorage.removeItem('babyglow:video:'+bid);}catch(e){}
  }
};

/* ---------- auto-sync polling (cloud mode) ---------- */
let _pollT=null;
function startAutoSync(){
  if(_pollT)clearInterval(_pollT);
  if(Store.mode!=='cloud')return;
  _pollT=setInterval(async()=>{
    if(!state.role)return;
    // don't disrupt active editing
    if(document.getElementById('modalRoot').innerHTML.trim())return;
    const ae=document.activeElement;
    if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT'))return;
    try{
      const fresh=await Store.getMain();
      if(fresh&&JSON.stringify(fresh)!==JSON.stringify(DB)){DB=fresh;videoCache={};render();}
    }catch(e){}
  },20000);
}

/* ---------- helpers ---------- */
const AV=['#7C82E6','#5E83E8','#3FA98A','#6FB7D8','#9B6BD9','#D26088','#4FA9C2','#5C6FC8'];
function avColor(s){let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return AV[Math.abs(h)%AV.length];}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function inf(id){return DB.influencers.find(x=>x.id===id);}
function clinic(id){return DB.clinics.find(x=>x.id===id);}
function clinicLabel(id){const c=clinic(id);if(!c)return '—';return c.name+(c.branch?' · '+c.branch:'');}
function uid(p){return p+Math.random().toString(36).slice(2,8);}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}
/* local (not UTC) YYYY-MM-DD so date-stamping never jumps a day in +07:00 */
function todayLocal(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function avatar(x,size){
  const s=size||46;
  if(x.photoUrl){
    const init0=esc(((x.h||'?').replace(/[^A-Za-zก-๙ㄱ-힣]/,'').charAt(0)||(x.h||'?').charAt(0)).toUpperCase());
    return `<div class="avatar" style="width:${s}px;height:${s}px;background:${avColor(x.h)}"><img src="${esc(x.photoUrl)}" alt="" referrerpolicy="no-referrer" loading="lazy" onerror="this.style.display='none';this.parentNode.textContent='${init0}'"></div>`;
  }
  const init=(x.h||'?').replace(/[^A-Za-zก-๙ㄱ-힣]/,'').charAt(0).toUpperCase()||(x.h||'?').charAt(0).toUpperCase();
  return `<div class="avatar" style="width:${s}px;height:${s}px;background:${avColor(x.h)}">${esc(init)}</div>`;
}
let videoCache={};
function videoSrc(b){
  if(b.footageType==='upload')return videoCache[b.id]||null;
  if(b.footageUrl)return b.footageUrl;
  return null;
}
function hasVideo(b){return !!videoSrc(b);}
function videoEmbed(src){
  if(!src)return '';
  if(src.startsWith('data:'))return `<div class="vidwrap"><video class="vid" controls src="${esc(src)}"></video></div>`;
  let m=src.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]+)/);
  if(m)return `<div class="vidwrap"><iframe class="vidframe" src="https://www.youtube.com/embed/${m[1]}" allowfullscreen></iframe></div>`;
  m=src.match(/\/file\/d\/([^/]+)/);
  if(m)return `<div class="vidwrap"><iframe class="vidframe" src="https://drive.google.com/file/d/${m[1]}/preview" allow="autoplay" allowfullscreen></iframe></div>`;
  if(/\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(src))return `<div class="vidwrap"><video class="vid" controls src="${esc(src)}"></video></div>`;
  return `<div class="vidwrap"><iframe class="vidframe" src="${esc(src)}" allowfullscreen></iframe></div>`;
}
async function loadVideos(){
  for(const b of DB.bookings){
    if(b.footageType==='upload'&&videoCache[b.id]===undefined){
      videoCache[b.id]=await Store.getVideo(b.id);
    }
  }
}
async function handleVideoUpload(bid,input){
  const f=input.files&&input.files[0];if(!f)return;
  const MAX=3.5*1024*1024;
  if(f.size>MAX){alert(t('videoTooLarge'));input.value='';return;}
  const reader=new FileReader();
  reader.onload=async()=>{
    const dataUrl=reader.result;
    const b=DB.bookings.find(x=>x.id===bid);if(!b)return;
    try{await Store.setVideo(bid,dataUrl);}catch(e){alert(t('videoTooLarge'));return;}
    videoCache[bid]=dataUrl;
    b.footageType='upload';b.footageUrl='';b.footageName=f.name;
    if(STAGES.indexOf(b.stage)<STAGES.indexOf('footage'))b.stage='footage';
    await saveData();render(true);toast(t('saved'));
  };
  reader.readAsDataURL(f);
}
async function setVideoLink(bid,url){
  const b=DB.bookings.find(x=>x.id===bid);if(!b)return;
  url=(url||'').trim();if(!url)return;
  b.footageUrl=url;b.footageType='link';b.footageName='';
  videoCache[bid]=null;
  try{await Store.delVideo(bid);}catch(e){}
  if(STAGES.indexOf(b.stage)<STAGES.indexOf('footage'))b.stage='footage';
  await saveData();render(true);toast(t('saved'));
}
async function removeVideo(bid){
  const b=DB.bookings.find(x=>x.id===bid);if(!b)return;
  b.footageUrl='';b.footageType='';b.footageName='';
  videoCache[bid]=null;
  try{await Store.delVideo(bid);}catch(e){}
  await saveData();render(true);
}

}

  else if(b.stage==='filmed')wf=adv('footage',t('footageUrl'));

function renderViewer(){

function computeStats(){
  const secured=DB.influencers.filter(x=>x.status==='confirmed'||x.status==='secured').length;
  const bks=DB.bookings;
  const fi=s=>STAGES.indexOf(s);
  const confirmed=bks.length;
  const scheduled=bks.filter(b=>!!b.date).length;
  const visited=bks.filter(b=>fi(b.stage)>=fi('visited')).length;
  const video=bks.filter(b=>!!videoSrc(b)||fi(b.stage)>=fi('footage')).length;
  const Upload=bks.filter(b=>b.stage==='Upload').length;
  let openRev=0,totalRev=0;
  bks.forEach(b=>(b.revisions||[]).forEach(r=>{totalRev++;if(!r.resolved)openRev++;}));
  return {secured,confirmed,scheduled,visited,video,Upload,openRev,totalRev};
}
function viewerStats(){
  const s=computeStats();
  const cards=[
    ['Secured influencers',s.secured,'var(--coral-deep)'],
    ['Selected Influencers',s.confirmed,'var(--ink)'],
    ['Visit completed',s.visited,'var(--green)'],
    ['Video received',s.video,'var(--blue)'],
    ['Upload',s.Upload,'var(--green)'],
    ['Editing in progress',s.openRev,'var(--rose)']
  ];
  const base=Math.max(s.secured,s.confirmed,1);
  const funnel=[
    ['Secured influencers',s.secured],
    ['Clinic visit confirmed',s.scheduled],
    ['Visit completed',s.visited],
    ['First Edit video received',s.video],
    ['Upload',s.Upload]
  ];
  const clinics=DB.clinics.map(c=>{
    const cb=DB.bookings.filter(b=>b.clinicId===c.id);
    return {name:c.name,Selected:cb.length,visited:cb.filter(b=>STAGES.indexOf(b.stage)>=STAGES.indexOf('visited')).length,
      Upload:cb.filter(b=>b.stage==='Upload').length};
  }).filter(c=>c.Selected>0);
  return `
  <div class="viewer-intro"><h2>Campaign overview</h2><p>Live progress across every secured influencer and clinic.</p></div>
  <div class="stat-grid">${cards.map(([l,n,c])=>
    `<div class="stat-card"><div class="stat-n" style="color:${c}">${n}</div><div class="stat-l">${l}</div></div>`).join('')}</div>
  <div class="panel"><h3 class="panel-h">Progress funnel</h3>
    ${funnel.map(([l,n])=>{const pct=Math.round(n/base*100);return `
      <div class="funnel-row"><div class="funnel-lab">${l}</div>
        <div class="funnel-track"><div class="funnel-fill" style="width:${Math.max(pct,4)}%">${n}</div></div></div>`;}).join('')}
  </div>
  ${clinics.length?`<div class="panel"><h3 class="panel-h">By clinic</h3>
    <table class="stat-table"><thead><tr><th>Clinic</th><th>Selected</th><th>Visited</th><th>Upload</th></tr></thead>
    <tbody>${clinics.map(c=>`<tr><td>${esc(c.name)}</td><td>${c.Selected}</td><td>${c.visited}</td><td>${c.Upload}</td></tr>`).join('')}</tbody></table>
  </div>`:''}`;
}

const CAL_DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const CAL_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function setSchedView(v){state.schedView=v;render();}
function shiftSchedMonth(delta){
  const ym=state.schedMonth||todayLocal().slice(0,7);
  const [Y,M]=ym.split('-').map(Number);
  const d=new Date(Y,M-1+delta,1);
  state.schedMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  state.schedDay=null;render();
}
function selectSchedDay(date){state.schedDay=(state.schedDay===date?null:date);render();}
function viewerSchedule(){
  const sorted=[...DB.bookings].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const intro=`<div class="viewer-intro"><h2>Confirmed schedule</h2><p>Visit dates, expected upload dates, First Edit videos and revision requests — all in one place.</p></div>`;
  const toggle=`<div class="sched-toggle">
    <button class="fpill ${state.schedView!=='calendar'?'on':''}" onclick="setSchedView('list')">List</button>
    <button class="fpill ${state.schedView==='calendar'?'on':''}" onclick="setSchedView('calendar')">Calendar</button>
  </div>`;
  if(state.schedView==='calendar')return intro+toggle+viewerCalendar();
  return intro+toggle+(sorted.length?sorted.map(viewerScheduleCard).join(''):
      `<div class="empty"><span class="ic">🗓️</span><div class="t">No Selected Influencers yet</div></div>`);
}
function viewerCalendar(){
  // events: clinic visits on b.date + uploads (actual if Upload, else expected) on their dates
  const events=[];
  DB.bookings.forEach(b=>{
    if(b.date)events.push({date:b.date,b,kind:'visit'});
    const sd=b.stageDates||{}, pl=b.plan||{};
    const actU=b.uploadDate||sd.Upload||'';
    if(b.stage==='Upload'&&actU)events.push({date:actU,b,kind:'updone'});
    else if(pl.upload)events.push({date:pl.upload,b,kind:'uplan'});
  });
  let ym=state.schedMonth;
  if(!ym){
    const ds=events.map(e=>e.date).filter(Boolean).sort();
    ym=ds.length?ds[0].slice(0,7):todayLocal().slice(0,7);
    state.schedMonth=ym;
  }
  const [Y,M]=ym.split('-').map(Number);
  const startDow=new Date(Y,M-1,1).getDay();
  const daysInMonth=new Date(Y,M,0).getDate();
  const todayStr=todayLocal();
  const byDay={};
  events.forEach(e=>{if(e.date.slice(0,7)===ym)(byDay[e.date]=byDay[e.date]||[]).push(e);});
  let cells='';
  for(let i=0;i<startDow;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=ym+'-'+String(d).padStart(2,'0');
    const items=byDay[ds]||[];
    const sel=state.schedDay===ds?'sel':'';
    const today=ds===todayStr?'today':'';
    const has=items.length?'has':'';
    let chips='';
    items.slice(0,3).forEach(e=>{
      const x=inf(e.b.infId)||{h:'?'};
      if(e.kind==='visit'){
        const si=STAGES.indexOf(e.b.stage);
        let cls='';
        if(e.b.stage==='Upload')cls='upl';
        else if(si>=STAGES.indexOf('footage'))cls='cut';
        else if(si>=STAGES.indexOf('visited'))cls='vis';
        const dot=e.b.stage==='Upload'?'● ':(si>=STAGES.indexOf('footage')?'◎ ':(si>=STAGES.indexOf('visited')?'◍ ':''));
        chips+=`<div class="cal-chip ${cls}">${dot}${esc(x.h)}${e.b.time?' '+esc(e.b.time):''}</div>`;
      }else if(e.kind==='updone'){
        chips+=`<div class="cal-chip upl">⬆ ${esc(x.h)}</div>`;
      }else{
        chips+=`<div class="cal-chip planu">⬆ ${esc(x.h)}</div>`;
      }
    });
    if(items.length>3)chips+=`<div class="cal-more">+${items.length-3} more</div>`;
    cells+=`<div class="cal-cell ${has} ${sel} ${today}" ${items.length?`onclick="selectSchedDay('${ds}')"`:''}>
      <span class="cal-num">${d}</span>${chips}</div>`;
  }
  const dowRow=CAL_DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  let detail='';
  if(state.schedDay&&byDay[state.schedDay]){
    const dt=new Date(state.schedDay+'T00:00:00');
    const lbl=CAL_DOW[dt.getDay()]+', '+CAL_MONTHS[dt.getMonth()]+' '+dt.getDate();
    const seen={};const cards=[];
    byDay[state.schedDay].forEach(e=>{if(!seen[e.b.id]){seen[e.b.id]=1;cards.push(e.b);}});
    detail=`<div style="margin-top:6px"><div style="font-size:13px;font-weight:700;color:var(--ink);margin:4px 0 12px">${lbl}</div>
      ${cards.map(viewerScheduleCard).join('')}</div>`;
  }
  return `<div class="cal-wrap">
    <div class="cal-head">
      <div class="cal-title">${CAL_MONTHS[M-1]} ${Y}</div>
      <div class="cal-nav">
        <button class="mini" onclick="shiftSchedMonth(-1)">←</button>
        <button class="mini" onclick="shiftSchedMonth(1)">→</button>
      </div>
    </div>
    <div class="cal-grid">${dowRow}${cells}</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--muted)">
      <span><span style="color:var(--warn)">◍</span> Visit done</span>
      <span><span style="color:var(--blue)">◎</span> First Edit</span>
      <span><span style="color:var(--green)">●</span> Upload</span>
      <span><span style="color:var(--coral-deep)">⬆</span> Upload (expected/done)</span>
    </div>
    ${events.length?'<div style="font-size:11.5px;color:var(--muted);margin-top:8px">Tap a day to see its reviews.</div>':'<div style="font-size:12.5px;color:var(--muted);margin-top:10px">No Selected Influencers yet.</div>'}
  </div>${detail}`;
}
function viewerScheduleCard(b){
  const x=inf(b.infId)||{h:'?'};
  const idx=STAGES.indexOf(b.stage);
  const visited=idx>=STAGES.indexOf('visited');
  const src=videoSrc(b);
  const cut=!!src||idx>=STAGES.indexOf('footage');
  const Upload=b.stage==='Upload';
  const sd=b.stageDates||{}; const pl=b.plan||{};
  const done=d=>d?` <em>${esc(d)}</em>`:'';
  const exp=d=>d?` <span class="exp">${t('exp')} ${esc(d)}</span>`:'';
  const revs=(b.revisions||[]).map(r=>`
    <div class="rev-msg ${r.by}">
      <div class="meta"><span>${r.by==='viewer'?'You':'Team'} · ${esc(r.at)}</span>
        ${r.resolved?`<span class="resolved">✓ Done${r.resolvedAt?' · '+esc(r.resolvedAt):''}</span>`:`<span style="color:var(--warn);font-weight:700">● In review</span>`}</div>
      ${esc(r.text)}</div>`).join('');
  return `<div class="bcard">
    <div class="bcard-head">${avatar(x,40)}
      <div class="who"><div class="h">${esc(x.h)}</div><div class="s">${clinicLabel(b.clinicId)}</div></div>
    </div>
    <div style="margin-top:6px">
      <div class="ms ${visited?'on':''}"><span class="msdot">${visited?'✓':''}</span><span class="mslab">Clinic visit <em>${esc(b.date||'TBD')}${b.time?' · '+esc(b.time):''}</em></span></div>
      <div class="ms ${visited?'on':''}"><span class="msdot">${visited?'✓':''}</span><span class="mslab">Visit completed${visited?done(sd.visited):exp(b.date)}</span></div>
      <div class="ms ${cut?'on':''}"><span class="msdot">${cut?'✓':''}</span><span class="mslab">First Edit video received${cut?done(sd.footage):exp(pl.footage)}</span></div>
      <div class="ms ${Upload?'on':''}"><span class="msdot">${Upload?'✓':''}</span><span class="mslab">Upload${Upload?done(b.uploadDate||sd.Upload):exp(pl.upload)}</span></div>
    </div>
    ${src?videoEmbed(src):`<div class="no-video">First Edit video not delivered yet.</div>`}
    ${src?`
      <div class="divider"></div>
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:8px">Revision requests</div>
      <div class="rev-thread">${revs||'<div style="font-size:13px;color:var(--muted)">No requests yet.</div>'}</div>
      ${Upload?'<div style="font-size:12.5px;color:var(--green);font-weight:600;margin-top:4px">This video is live — revisions are closed.</div>':`<div class="field-row">
        <input id="rev_${b.id}" placeholder="Describe the change you need…">
        <button class="mini solid" onclick="addRevision('${b.id}','viewer',document.getElementById('rev_${b.id}').value)">Send request</button>
      </div>`}`:''}
  </div>`;
}

/* ============================================================
   MUTATIONS
   ============================================================ */
async function setStage(id,stage){
  const b=DB.bookings.find(x=>x.id===id);if(!b)return;
  b.stage=stage;
  const today=todayLocal();
  if(!b.stageDates)b.stageDates={};
  // record the date this stage was reached (keep existing if already set)
  if(!b.stageDates[stage])b.stageDates[stage]=today;
  if(stage==='Upload'&&!b.uploadDate)b.uploadDate=today;
  // sync influencer status to confirmed
  const x=inf(b.infId);if(x)x.status='confirmed';
  await saveData();render(true);toast(t('saved'));
}
async function saveBookingField(id,field,val){
  const b=DB.bookings.find(x=>x.id===id);if(!b)return;
  b[field]=(val||'').trim();
  if(field==='uploadDate'&&b[field]){
    if(!b.stageDates)b.stageDates={};
    if(!b.stageDates.Upload)b.stageDates.Upload=b[field];
    if(STAGES.indexOf(b.stage)<STAGES.indexOf('Upload'))b.stage='Upload';
    const x=inf(b.infId);if(x)x.status='confirmed';
  }
  await saveData();render(true);toast(t('saved'));
}
/* EXPECTED (planned) date — never advances the stage */
async function savePlanDate(id,key,val){
  const b=DB.bookings.find(x=>x.id===id);if(!b)return;
  if(!b.plan)b.plan={};
  val=(val||'').trim();
  if(val)b.plan[key]=val;else delete b.plan[key];
  await saveData();render(true);toast(t('saved'));
}
/* ACTUAL (completed) date — sets the real date AND advances the stage */
async function saveStageDate(id,stage,val){
  const b=DB.bookings.find(x=>x.id===id);if(!b)return;
  if(!b.stageDates)b.stageDates={};
  val=(val||'').trim();
  if(val){
    b.stageDates[stage]=val;
    if(STAGES.indexOf(b.stage)<STAGES.indexOf(stage))b.stage=stage;
    const x=inf(b.infId);if(x)x.status='confirmed';
    if(stage==='Upload'&&!b.uploadDate)b.uploadDate=val;
  }else{
    delete b.stageDates[stage];
  }
  await saveData();render(true);toast(t('saved'));
}
async function addRevision(id,by,text){
  if(!text||!text.trim()){return;}
  // reload latest first to reduce overwrite of concurrent edits
  try{const fresh=await Store.getMain();if(fresh)DB=fresh;}catch(e){}
  const b=DB.bookings.find(x=>x.id===id);if(!b)return;
  if(!b.revisions)b.revisions=[];
  b.revisions.push({id:uid('r'),by,text:text.trim(),at:todayLocal()+' '+new Date().toTimeString().slice(0,5),resolved:false});
  await saveData();render(true);toast(t('saved'));
}
async function resolveRev(bid,rid){
  const b=DB.bookings.find(x=>x.id===bid);if(!b)return;
  const r=b.revisions.find(x=>x.id===rid);if(r){r.resolved=true;r.resolvedAt=todayLocal();}
  await saveData();render(true);toast(t('saved'));
}
async function delInfluencer(id){
  if(!confirm(t('deleteConfirm')))return;
  DB.influencers=DB.influencers.filter(x=>x.id!==id);
  DB.bookings=DB.bookings.filter(b=>b.infId!==id);
  await saveData();render();
}
async function delClinic(id){
  if(!confirm(t('deleteConfirm')))return;
  DB.clinics=DB.clinics.filter(x=>x.id!==id);
  await saveData();render();
}
async function delBooking(id){
  if(!confirm(t('deleteConfirm')))return;
  DB.bookings=DB.bookings.filter(x=>x.id!==id);
  await saveData();render();
}

/* ============================================================
   MODALS
   ============================================================ */
function closeModal(){document.getElementById('modalRoot').innerHTML='';}
function modalShell(title,bodyHtml,footHtml){
  document.getElementById('modalRoot').innerHTML=`
  <div class="modal-back" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-head"><h3>${title}</h3><button class="x" onclick="closeModal()">×</button></div>
      <div class="modal-body">${bodyHtml}</div>
      <div class="modal-foot">${footHtml}</div>
    </div>
  </div>`;
}
function fld(id,label,val,ph,type){return `<div class="field"><label>${label}</label>
  <input id="${id}" type="${type||'text'}" value="${esc(val||'')}" placeholder="${esc(ph||'')}"></div>`;}

function openInfluencerModal(id){
  const x=id?inf(id):null;
  const statusOpts=['confirmed','secured','candidate','rejected'].map(s=>
    `<option value="${s}" ${x&&x.status===s?'selected':''}>${t('f'+s.charAt(0).toUpperCase()+s.slice(1))}</option>`).join('');
  const body=`<div class="form-grid">
    ${fld('m_h',t('handle'),x&&x.h,'@handle')}
    ${fld('m_rn',t('realName'),x&&x.realName)}
    ${fld('m_ig',t('ig')+' URL',x&&x.ig,'https://instagram.com/…')}
    ${fld('m_igf',t('ig')+' '+t('followers'),x&&x.igF,'e.g. 27K')}
    ${fld('m_tt',t('tt')+' URL',x&&x.tt,'https://tiktok.com/@…')}
    ${fld('m_ttf',t('tt')+' '+t('followers'),x&&x.ttF,'e.g. 50K')}
    ${fld('m_area',t('area'),x&&x.area)}
    ${fld('m_dates',t('dates'),x&&x.dates)}
    <div class="field"><label>${t('status')}</label><select id="m_status">${statusOpts}</select></div>
    ${fld('m_photo',t('photoUrl'),x&&x.photoUrl,'https://…')}
    <div class="field full">${fld('m_note',t('note'),x&&x.note)}</div>
  </div>`;
  modalShell(id?t('edit'):t('addInfluencer'),body,
    `<button class="btn-ghost" onclick="closeModal()">${t('cancel')}</button>
     <button class="btn-primary" onclick="saveInfluencer('${id||''}')">${t('save')}</button>`);
}
async function saveInfluencer(id){
  const g=k=>document.getElementById(k).value.trim();
  const h=g('m_h');if(!h){toast(t('handle')+' ?');return;}
  const data={h,realName:g('m_rn'),ig:g('m_ig'),igF:g('m_igf'),tt:g('m_tt'),ttF:g('m_ttf'),
    area:g('m_area'),dates:g('m_dates'),status:document.getElementById('m_status').value,
    photoUrl:g('m_photo'),note:g('m_note')};
  if(id){Object.assign(inf(id),data);}
  else{DB.influencers.push(Object.assign({id:uid('i')},data));}
  await saveData();closeModal();render();toast(t('saved'));
}

function openClinicModal(id){
  const c=id?clinic(id):null;
  const body=`<div class="form-grid">
    ${fld('c_name',t('clinic'),c&&c.name)}
    ${fld('c_branch',t('branch'),c&&c.branch)}
    <div class="field full">${fld('c_map',t('mapUrl'),c&&c.mapUrl,'https://maps.app.goo.gl/…')}</div>
  </div>`;
  modalShell(id?t('edit'):t('addClinic'),body,
    `<button class="btn-ghost" onclick="closeModal()">${t('cancel')}</button>
     <button class="btn-primary" onclick="saveClinic('${id||''}')">${t('save')}</button>`);
}
async function saveClinic(id){
  const g=k=>document.getElementById(k).value.trim();
  const name=g('c_name');if(!name){toast(t('clinic')+' ?');return;}
  const data={name,branch:g('c_branch'),mapUrl:g('c_map')};
  if(id){Object.assign(clinic(id),data);}
  else{DB.clinics.push(Object.assign({id:uid('c')},data));}
  await saveData();closeModal();render();toast(t('saved'));
}

function openBookingModal(id,presetInf){
  const b=id?DB.bookings.find(x=>x.id===id):null;
  const infOpts=DB.influencers.map(x=>
    `<option value="${x.id}" ${(b&&b.infId===x.id)||(presetInf===x.id)?'selected':''}>${esc(x.h)}${x.realName?' ('+esc(x.realName)+')':''}</option>`).join('');
  const clinicOpts=DB.clinics.map(c=>
    `<option value="${c.id}" ${b&&b.clinicId===c.id?'selected':''}>${esc(c.name)}${c.branch?' · '+esc(c.branch):''}</option>`).join('');
  const body=`<div class="form-grid">
    <div class="field full"><label>${t('pickInfluencer')}</label><select id="b_inf"><option value="">${t('selectInfluencer')}</option>${infOpts}</select></div>
    <div class="field full"><label>${t('clinic')}</label><select id="b_clinic"><option value="">${t('selectClinic')}</option>${clinicOpts}</select></div>
    ${fld('b_date',t('date'),b&&b.date,'','date')}
    ${fld('b_time',t('time'),b&&b.time,'e.g. 14:00')}
  </div>`;
  modalShell(id?t('edit'):t('confirmReview'),body,
    `<button class="btn-ghost" onclick="closeModal()">${t('cancel')}</button>
     <button class="btn-primary" onclick="saveBooking('${id||''}')">${t('confirm')}</button>`);
}
async function saveBooking(id){
  const infId=document.getElementById('b_inf').value;
  const clinicId=document.getElementById('b_clinic').value;
  const date=document.getElementById('b_date').value;
  const time=document.getElementById('b_time').value.trim();
  if(!infId){toast(t('selectInfluencer'));return;}
  if(id){const b=DB.bookings.find(x=>x.id===id);Object.assign(b,{infId,clinicId,date,time});}
  else{DB.bookings.push({id:uid('b'),infId,clinicId,date,time,stage:'confirmed',footageUrl:'',finalUrl:'',uploadDate:'',plan:{},stageDates:{},revisions:[]});}
  const x=inf(infId);if(x)x.status='confirmed';
  await saveData();closeModal();state.tab='reviews';setupChrome();render();toast(t('saved'));
}

/* ============================================================
   EXCEL EXPORT
   ============================================================ */
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const infRows=DB.influencers.map(x=>({
    Handle:x.h,'Real name':x.realName,Status:x.status,Area:x.area,Available:x.dates,
    Instagram:x.ig,'IG followers':x.igF,TikTok:x.tt,'TT followers':x.ttF,Note:x.note
  }));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(infRows),'Influencers');
  const clRows=DB.clinics.map(c=>{
    const n=DB.bookings.filter(b=>b.clinicId===c.id).length;
    return {Clinic:c.name,Branch:c.branch,'Map URL':c.mapUrl,'Reviews Selected':n};
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(clRows),'Clinics');
  const bkRows=DB.bookings.map(b=>{
    const x=inf(b.infId)||{};
    const sd=b.stageDates||{};
    const pl=b.plan||{};
    return {Influencer:x.h||'',Clinic:clinicLabel(b.clinicId),Date:b.date,Time:b.time,
      Stage:STAGE_LABEL.en[b.stage],
      'Visit date (done)':sd.visited||'',
      'First Edit (expected)':pl.footage||'','First Edit (done)':sd.footage||'',
      'Upload (expected)':pl.upload||'','Upload (done)':b.uploadDate||sd.Upload||'',
      'Footage link':b.footageUrl,'Uploadlink':b.finalUrl,
      'Editing in progress':(b.revisions||[]).filter(r=>!r.resolved).length,
      'Total revisions':(b.revisions||[]).length};
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(bkRows),'Reviews');
  const revRows=[];
  DB.bookings.forEach(b=>{const x=inf(b.infId)||{};(b.revisions||[]).forEach(r=>{
    revRows.push({Influencer:x.h||'',Clinic:clinicLabel(b.clinicId),From:r.by,Request:r.text,
      Date:r.at,Resolved:r.resolved?'Yes':'No'});});});
  if(revRows.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(revRows),'Revisions');
  XLSX.writeFile(wb,'babyGLOW_Campaign_'+todayLocal()+'.xlsx');
}

/* ---------- toast ---------- */
let toastT;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),1800);
}
